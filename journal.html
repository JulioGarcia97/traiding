<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julio Trading — Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c12; --surface: #0e1420; --border: #1a2235;
  --green: #00e676; --red: #ff1744; --blue: #2979ff; --gold: #ffd740;
  --text: #e8edf5; --dim: #4a5568; --mid: #8899aa;
  --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(41,121,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(41,121,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }

header { padding:20px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:rgba(8,12,18,0.95); position:sticky; top:0; z-index:100; }
.logo { font-family:var(--mono); font-size:12px; letter-spacing:3px; color:var(--blue); }
.logo span { color:var(--gold); }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; display:inline-block; margin-right:6px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.tabs { display:flex; border-bottom:1px solid var(--border); background:rgba(8,12,18,0.8); }
.tab { padding:14px 28px; font-family:var(--mono); font-size:11px; letter-spacing:1.5px; color:var(--mid); border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); }

main { padding:28px 32px; max-width:1300px; margin:0 auto; }

/* KPIs */
.kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:28px; }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
.kpi-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--mid); margin-bottom:8px; text-transform:uppercase; }
.kpi-val { font-family:var(--mono); font-size:24px; font-weight:700; }
.kpi-val.g { color:var(--green); } .kpi-val.r { color:var(--red); } .kpi-val.a { color:var(--gold); } .kpi-val.b { color:var(--blue); }

/* Add trade form */
.add-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:24px; }
.add-title { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--mid); margin-bottom:16px; text-transform:uppercase; }
.form-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:12px; }
.fg { display:flex; flex-direction:column; gap:4px; }
.fg label { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
.fg input, .fg select { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:7px 10px; font-family:var(--mono); font-size:12px; }
.fg input:focus, .fg select:focus { outline:none; border-color:var(--blue); }
.btn-primary { padding:9px 22px; background:rgba(41,121,255,0.15); border:1px solid var(--blue); color:var(--blue); border-radius:6px; font-family:var(--mono); font-size:11px; cursor:pointer; letter-spacing:1px; transition:all .2s; }
.btn-primary:hover { background:var(--blue); color:white; }

/* Filters */
.filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.f-btn { padding:5px 14px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--mid); font-family:var(--mono); font-size:10px; cursor:pointer; letter-spacing:1px; transition:all .15s; }
.f-btn.active { background:rgba(41,121,255,0.15); border-color:var(--blue); color:var(--blue); }

/* Table */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px; }
th { padding:10px 12px; text-align:left; color:var(--dim); font-size:9px; letter-spacing:1.5px; border-bottom:1px solid var(--border); text-transform:uppercase; }
td { padding:10px 12px; border-bottom:1px solid rgba(26,34,53,.5); color:var(--text); }
tr:hover td { background:rgba(41,121,255,.03); }

.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.5px; }
.b-buy { background:rgba(0,230,118,.1); color:var(--green); border:1px solid rgba(0,230,118,.25); }
.b-sell { background:rgba(255,23,68,.1); color:var(--red); border:1px solid rgba(255,23,68,.25); }
.b-win { background:rgba(0,230,118,.1); color:var(--green); }
.b-loss { background:rgba(255,23,68,.1); color:var(--red); }
.b-pending { background:rgba(255,215,64,.1); color:var(--gold); }
.b-skip { background:rgba(136,153,170,.1); color:var(--mid); }
.b-nq { background:rgba(41,121,255,.1); color:var(--blue); }
.b-gold { background:rgba(255,215,64,.1); color:var(--gold); }

.edit-input { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:4px 6px; font-family:var(--mono); font-size:11px; width:90px; }
.edit-input:focus { outline:none; border-color:var(--blue); }
.res-sel { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:4px 6px; font-family:var(--mono); font-size:10px; cursor:pointer; }
.res-sel:focus { outline:none; border-color:var(--blue); }
.btn-save { padding:3px 10px; border:1px solid var(--green); color:var(--green); background:transparent; border-radius:4px; font-family:var(--mono); font-size:10px; cursor:pointer; transition:all .15s; }
.btn-save:hover { background:var(--green); color:var(--bg); }
.btn-del { padding:3px 8px; border:none; color:var(--dim); background:transparent; cursor:pointer; font-size:13px; border-radius:4px; }
.btn-del:hover { color:var(--red); }

.empty { text-align:center; padding:60px; color:var(--dim); font-family:var(--mono); font-size:12px; }

/* Analysis */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; }
.chart-title { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--mid); margin-bottom:16px; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.chart-title::before { content:''; width:3px; height:10px; background:var(--blue); border-radius:2px; }
.bar-list { display:flex; flex-direction:column; gap:8px; }
.br { display:grid; grid-template-columns:55px 1fr 45px 45px; align-items:center; gap:8px; }
.br-label { font-family:var(--mono); font-size:10px; color:var(--mid); text-align:right; }
.br-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.br-fill { height:100%; border-radius:3px; transition:width 1s ease; }
.br-pct { font-family:var(--mono); font-size:10px; color:var(--text); text-align:right; }
.br-n { font-family:var(--mono); font-size:9px; color:var(--dim); text-align:right; }

.section { display:none; } .section.active { display:block; }
</style>
</head>
<body>

<header>
  <div class="logo">JULIO <span>TRADING</span> — JOURNAL</div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--mid)">
    <span class="dot"></span><span id="status-txt">Conectando...</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('journal',this)">JOURNAL</button>
  <button class="tab" onclick="showTab('analysis',this)">ANÁLISIS</button>
</div>

<main>

  <!-- JOURNAL -->
  <div id="tab-journal" class="section active">
    <div class="kpi-grid" id="kpis"></div>

    <div class="add-card">
      <div class="add-title">Agregar señal manual</div>
      <div class="form-row">
        <div class="fg"><label>Símbolo</label>
          <select id="f-sym"><option value="NQ1!">NQ1!</option><option value="XAUUSD">XAUUSD</option></select></div>
        <div class="fg"><label>Acción</label>
          <select id="f-act"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
        <div class="fg"><label>Entry</label><input type="number" id="f-entry" placeholder="21540.25" step="0.01"></div>
        <div class="fg"><label>SL</label><input type="number" id="f-sl" placeholder="21480.00" step="0.01"></div>
        <div class="fg"><label>TP</label><input type="number" id="f-tp" placeholder="21660.75" step="0.01"></div>
        <div class="fg"><label>Resultado</label>
          <select id="f-res">
            <option value="pending">Pendiente</option>
            <option value="win">TP alcanzado</option>
            <option value="loss">SL alcanzado</option>
            <option value="skip">No tomado</option>
          </select></div>
      </div>
      <button class="btn-primary" onclick="addTrade()">+ Agregar</button>
    </div>

    <div class="filters">
      <button class="f-btn active" onclick="setFilter('ALL',this)">TODOS</button>
      <button class="f-btn" onclick="setFilter('NQ1!',this)">NQ</button>
      <button class="f-btn" onclick="setFilter('XAUUSD',this)">GOLD</button>
      <button class="f-btn" onclick="setFilter('win',this)">GANADOS</button>
      <button class="f-btn" onclick="setFilter('loss',this)">PERDIDOS</button>
      <button class="f-btn" onclick="setFilter('pending',this)">PENDIENTES</button>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha/Hora</th><th>Symbol</th><th>Dir</th>
            <th>Entry</th><th>SL</th><th>TP</th>
            <th>Resultado</th><th></th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ANALYSIS -->
  <div id="tab-analysis" class="section">
    <div class="kpi-grid" id="kpis2"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Win rate por hora (CST)</div>
        <div class="bar-list" id="chart-hours"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Win rate por día</div>
        <div class="bar-list" id="chart-days"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">NQ — resultados</div>
        <div class="bar-list" id="chart-nq"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Gold — resultados</div>
        <div class="bar-list" id="chart-gold"></div>
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:20px">
      <div class="chart-title">BUY vs SELL — win rate por dirección</div>
      <div class="bar-list" id="chart-dir"></div>
    </div>
  </div>

</main>

<script>
const API = '';
let trades = [];
let filter = 'ALL';

async function load() {
  try {
    const r = await fetch(API + '/trades');
    trades = await r.json();
    document.getElementById('status-txt').textContent = 'Online — ' + trades.length + ' trades';
    renderAll();
  } catch(e) {
    document.getElementById('status-txt').textContent = 'Sin conexión';
  }
}

async function addTrade() {
  const body = {
    symbol:   document.getElementById('f-sym').value,
    action:   document.getElementById('f-act').value,
    entry:    document.getElementById('f-entry').value,
    sl:       document.getElementById('f-sl').value,
    tp:       document.getElementById('f-tp').value,
    result:   document.getElementById('f-res').value,
  };
  await fetch(API + '/trades', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  ['f-entry','f-sl','f-tp'].forEach(id => document.getElementById(id).value = '');
  await load();
}

async function saveTrade(id) {
  const sl      = document.getElementById('sl-'+id).value;
  const tp      = document.getElementById('tp-'+id).value;
  const result  = document.getElementById('res-'+id).value;
  await fetch(API + '/trades/' + id, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sl, tp, result })
  });
  await load();
}

async function deleteTrade(id) {
  if (!confirm('¿Eliminar este trade?')) return;
  await fetch(API + '/trades/' + id, { method:'DELETE' });
  await load();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function showTab(t, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  el.classList.add('active');
  if (t === 'analysis') renderAnalysis();
}

function renderAll() { renderKPIs(); renderTable(); }

function renderKPIs() {
  const done = trades.filter(t => t.result === 'win' || t.result === 'loss');
  const wins = trades.filter(t => t.result === 'win').length;
  const losses = trades.filter(t => t.result === 'loss').length;
  const wr = done.length ? Math.round(wins/done.length*100) : 0;
  const nqDone = done.filter(t => t.symbol === 'NQ1!');
  const goldDone = done.filter(t => t.symbol === 'XAUUSD');
  const nqWR = nqDone.length ? Math.round(nqDone.filter(t=>t.result==='win').length/nqDone.length*100) : 0;
  const goldWR = goldDone.length ? Math.round(goldDone.filter(t=>t.result==='win').length/goldDone.length*100) : 0;
  const pending = trades.filter(t => t.result === 'pending').length;

  const kpiHTML = (label, val, cls) => `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-val ${cls}">${val}</div></div>`;
  const html = [
    kpiHTML('Total señales', trades.length, 'b'),
    kpiHTML('Win rate', wr+'%', wr>=50?'g':'r'),
    kpiHTML('Ganados / Perdidos', wins+' / '+losses, ''),
    kpiHTML('Win rate NQ', nqWR+'%', nqWR>=50?'g':'r'),
    kpiHTML('Win rate Gold', goldWR+'%', goldWR>=50?'g':'r'),
    kpiHTML('Pendientes', pending, 'a'),
  ].join('');
  document.getElementById('kpis').innerHTML = html;
  document.getElementById('kpis2').innerHTML = html;
}

function renderTable() {
  let list = [...trades];
  if (filter === 'NQ1!' || filter === 'XAUUSD') list = list.filter(t => t.symbol === filter);
  else if (['win','loss','pending','skip'].includes(filter)) list = list.filter(t => t.result === filter);

  const body = document.getElementById('tbl-body');
  if (!list.length) {
    body.innerHTML = `<tr><td colspan="10"><div class="empty">Sin trades con este filtro</div></td></tr>`;
    return;
  }

  body.innerHTML = list.map(t => {
    const d = new Date(t.ts);
    const ds = d.toLocaleDateString('es-MX',{month:'short',day:'2-digit'}) + ' ' + d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    const symCls = t.symbol === 'NQ1!' ? 'b-nq' : 'b-gold';
    const symLbl = t.symbol === 'NQ1!' ? 'NQ' : 'GOLD';
    const resCls = { win:'b-win', loss:'b-loss', pending:'b-pending', skip:'b-skip' }[t.result] || 'b-pending';
    const resLbl = { win:'TP ✓', loss:'SL ✗', pending:'Pendiente', skip:'No tomado' }[t.result] || t.result;
    return `<tr>
      <td style="color:var(--mid);font-size:10px;">${ds}</td>
      <td><span class="badge ${symCls}">${symLbl}</span></td>
      <td><span class="badge ${t.action==='BUY'?'b-buy':'b-sell'}">${t.action}</span></td>
      <td>${t.entry || '—'}</td>
      <td><input class="edit-input" id="sl-${t.id}" value="${t.sl}" placeholder="SL"></td>
      <td><input class="edit-input" id="tp-${t.id}" value="${t.tp}" placeholder="TP"></td>
      <td>
        <select class="res-sel" id="res-${t.id}">
          <option value="pending" ${t.result==='pending'?'selected':''}>Pendiente</option>
          <option value="win" ${t.result==='win'?'selected':''}>TP alcanzado</option>
          <option value="loss" ${t.result==='loss'?'selected':''}>SL alcanzado</option>
          <option value="skip" ${t.result==='skip'?'selected':''}>No tomado</option>
        </select>
      </td>
      <td style="display:flex;gap:6px;align-items:center;">
        <button class="btn-save" onclick="saveTrade(${t.id})">Guardar</button>
        <button class="btn-del" onclick="deleteTrade(${t.id})">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function renderAnalysis() {
  const done = trades.filter(t => t.result === 'win' || t.result === 'loss');

  // Hours 8-16 CST
  const hours = {};
  for (let h=8;h<=16;h++) hours[h]={w:0,n:0};
  done.forEach(t => {
    const h = new Date(t.ts).getHours();
    if (h in hours) { hours[h].n++; if(t.result==='win') hours[h].w++; }
  });
  const maxH = Math.max(...Object.values(hours).map(v=>v.n),1);
  const hLabels = {8:'8am',9:'9am',10:'10am',11:'11am',12:'12pm',13:'1pm',14:'2pm',15:'3pm',16:'4pm'};
  document.getElementById('chart-hours').innerHTML = Object.entries(hours).map(([h,v])=>{
    const wr = v.n ? Math.round(v.w/v.n*100) : 0;
    const color = wr>=60?'var(--green)':wr>=40?'var(--gold)':'var(--red)';
    const pct = Math.round(v.n/maxH*100);
    return `<div class="br">
      <div class="br-label">${hLabels[h]}</div>
      <div class="br-track"><div class="br-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="br-pct" style="color:${color}">${wr}%</div>
      <div class="br-n">(${v.n})</div>
    </div>`;
  }).join('');

  // Days
  const days={1:{w:0,n:0},2:{w:0,n:0},3:{w:0,n:0},4:{w:0,n:0},5:{w:0,n:0}};
  const dNames={1:'Lunes',2:'Martes',3:'Miérc',4:'Jueves',5:'Viernes'};
  done.forEach(t=>{ const d=new Date(t.ts).getDay(); if(d in days){days[d].n++;if(t.result==='win')days[d].w++;} });
  const maxD = Math.max(...Object.values(days).map(v=>v.n),1);
  document.getElementById('chart-days').innerHTML = Object.entries(days).map(([d,v])=>{
    const wr = v.n ? Math.round(v.w/v.n*100) : 0;
    const color = wr>=60?'var(--green)':wr>=40?'var(--gold)':'var(--red)';
    return `<div class="br">
      <div class="br-label">${dNames[d]}</div>
      <div class="br-track"><div class="br-fill" style="width:${Math.round(v.n/maxD*100)}%;background:${color}"></div></div>
      <div class="br-pct" style="color:${color}">${wr}%</div>
      <div class="br-n">(${v.n})</div>
    </div>`;
  }).join('');

  // NQ
  const nqD = done.filter(t=>t.symbol==='NQ1!');
  renderSymbolChart('chart-nq', nqD);
  const goldD = done.filter(t=>t.symbol==='XAUUSD');
  renderSymbolChart('chart-gold', goldD);

  // Direction
  const buyD = done.filter(t=>t.action==='BUY');
  const sellD = done.filter(t=>t.action==='SELL');
  const buyWR = buyD.length ? Math.round(buyD.filter(t=>t.result==='win').length/buyD.length*100) : 0;
  const sellWR = sellD.length ? Math.round(sellD.filter(t=>t.result==='win').length/sellD.length*100) : 0;
  document.getElementById('chart-dir').innerHTML = [
    {label:'BUY', wr:buyWR, n:buyD.length, color:'var(--green)'},
    {label:'SELL', wr:sellWR, n:sellD.length, color:'var(--red)'},
  ].map(x=>`<div class="br">
    <div class="br-label">${x.label}</div>
    <div class="br-track"><div class="br-fill" style="width:${x.wr}%;background:${x.color}"></div></div>
    <div class="br-pct" style="color:${x.color}">${x.wr}%</div>
    <div class="br-n">(${x.n})</div>
  </div>`).join('');
}

function renderSymbolChart(elId, data) {
  const byHour = {};
  for(let h=8;h<=16;h++) byHour[h]={w:0,n:0};
  data.forEach(t=>{ const h=new Date(t.ts).getHours(); if(h in byHour){byHour[h].n++;if(t.result==='win')byHour[h].w++;} });
  const hLabels={8:'8am',9:'9am',10:'10am',11:'11am',12:'12pm',13:'1pm',14:'2pm',15:'3pm',16:'4pm'};
  const maxN = Math.max(...Object.values(byHour).map(v=>v.n),1);
  document.getElementById(elId).innerHTML = Object.entries(byHour).map(([h,v])=>{
    const wr = v.n ? Math.round(v.w/v.n*100) : 0;
    const color = v.n===0?'var(--border)':wr>=60?'var(--green)':wr>=40?'var(--gold)':'var(--red)';
    return `<div class="br">
      <div class="br-label">${hLabels[h]}</div>
      <div class="br-track"><div class="br-fill" style="width:${Math.round(v.n/maxN*100)}%;background:${color}"></div></div>
      <div class="br-pct" style="color:${color}">${v.n?wr+'%':'—'}</div>
      <div class="br-n">(${v.n})</div>
    </div>`;
  }).join('');
}

load();
setInterval(load, 20000);
</script>
</body>
</html>
